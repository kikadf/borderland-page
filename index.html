<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>borderland.hu - Work in Progress</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #0056b3;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 0;
        }
        .dots::after {
            content: '';
            animation: blink 1.5s infinite step-start;
        }
        @keyframes blink {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>borderland.hu</h1>
        <p>pkgsrc binary repository <span class="dots">work in progress</span></p>
    </div>

</body>
</html>
